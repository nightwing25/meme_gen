<html>
   <body>
					 <form action = "/" method = "post"><!--after the local host this means go to the funct with that end point-->
				{% if result %}
						<h2>Search Results:</h2>
						
						{% if result.memes %}
								{% for meme in result.memes %}
										<div style="margin-bottom: 20px;">
																<h3>{{ meme.description }}</h3>
																<img src="{{ meme.url }}" alt="Meme" style="max-width: 400px;">
										</div>
								{% endfor %}
						{% else %}
								<p>No memes found or error: {{ result }}</p>
						{% endif %}
				{% endif %}
         <p>Find Meme:</p>
         <p><input type = "text" name = "nm" placholder="enter keyword"></p>
         <p><input type = "submit" value = "find meme" /></p>
      </form>
   </body>
</html>
